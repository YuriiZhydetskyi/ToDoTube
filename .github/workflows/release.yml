name: Release

# Build both browser targets and attach the zips to a GitHub release on
# tag push (`vX.Y.Z`). Submitting to Chrome Web Store / AMO is still a
# manual step in v1 — see REQUIREMENTS.md §13 ("Distribution").

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm compile
      - run: pnpm test
      - run: pnpm zip

      - name: Attach zips to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .output/*.zip
