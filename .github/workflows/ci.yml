name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm compile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Selector guard — YouTube identifiers must live ONLY in
      # src/surfaces/<surface>/{selectors,heuristics}.ts. See
      # docs/SELECTORS.md and REQUIREMENTS.md §6.1.
      - name: Selector guard
        run: |
          set -e
          if ! find src -type f -name '*.ts' -print -quit 2>/dev/null | grep -q .; then
            echo "No TypeScript files in src/ yet; skipping selector guard."
            exit 0
          fi
          leaked=$(grep -RIn --include='*.ts' \
                     -E '(\bytd-|yt-navigate-finish|#secondary|#related)' src/ \
                   | grep -vE 'src/surfaces/[^/]+/(selectors|heuristics)\.ts' \
                   || true)
          if [ -n "$leaked" ]; then
            echo "::error::YouTube identifiers leaked outside selectors.ts/heuristics.ts:"
            echo "$leaked"
            exit 1
          fi
          echo "Selector guard passed."

      # Anki constant guard — the AnkiConnect endpoint must live ONLY in
      # src/signals/anki/constants.ts (the "no magic constants" rule, same as
      # the selector guard). Action names are already centralized via the
      # typed ANKI_ACTIONS object, so we only need to pin the endpoint string.
      - name: Anki constant guard
        run: |
          set -e
          leaked=$(grep -RIn --include='*.ts' \
                     -E '127\.0\.0\.1:8765' src/ \
                   | grep -vE 'src/signals/anki/constants\.ts' \
                   || true)
          if [ -n "$leaked" ]; then
            echo "::error::AnkiConnect endpoint leaked outside signals/anki/constants.ts:"
            echo "$leaked"
            exit 1
          fi
          echo "Anki constant guard passed."

      # Activity bridge constant guard — the bridge endpoint must live ONLY in
      # src/gates/activity-budget/constants.ts (same "no magic constants" rule).
      # The bridge serves a fitness source (e.g. Garmin), so the contract is
      # the gate's domain. (bridge/ is a separate package outside src/.)
      - name: Activity bridge constant guard
        run: |
          set -e
          leaked=$(grep -RIn --include='*.ts' \
                     -E '127\.0\.0\.1:8930' src/ \
                   | grep -vE 'src/gates/activity-budget/constants\.ts' \
                   || true)
          if [ -n "$leaked" ]; then
            echo "::error::Activity bridge endpoint leaked outside gates/activity-budget/constants.ts:"
            echo "$leaked"
            exit 1
          fi
          echo "Activity bridge constant guard passed."

      # Blocked-site domain guard — the social-site domains must live ONLY in
      # src/shared/blocklist.ts (the "no magic constants" rule). youtube.com is
      # intentionally NOT guarded: it predates this and is also used by the
      # recommendation surface (youtube-watch.content.ts), which is a separate
      # feature from gating.
      - name: Blocked-site domain guard
        run: |
          set -e
          leaked=$(grep -RIn --include='*.ts' \
                     -E '\b(tiktok|facebook|instagram)\.com\b|\bthreads\.(net|com)\b|\bx\.com\b' src/ \
                   | grep -vE 'src/shared/blocklist(\.test)?\.ts' \
                   || true)
          if [ -n "$leaked" ]; then
            echo "::error::Blocked-site domains leaked outside shared/blocklist.ts:"
            echo "$leaked"
            exit 1
          fi
          echo "Blocked-site domain guard passed."

      - name: Build (Chrome)
        run: pnpm build

      - name: Build (Firefox)
        run: pnpm build:firefox
