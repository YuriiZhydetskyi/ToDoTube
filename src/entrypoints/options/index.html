<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoTube — Settings</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f0f0f;
        --fg-muted: #606060;
        --border: rgba(0, 0, 0, 0.1);
        --border-strong: rgba(0, 0, 0, 0.2);
        --primary: #065fd4;
        --primary-fg: #ffffff;
        --pill-ok-bg: #e6f4ea;
        --pill-ok-fg: #146c2e;
        --pill-warn-bg: #fef7e0;
        --pill-warn-fg: #92590b;
        --pill-muted-bg: #eee;
        --pill-muted-fg: #555;
        --error-fg: #b00020;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f0f;
          --fg: #ffffff;
          --fg-muted: #aaa;
          --border: rgba(255, 255, 255, 0.1);
          --border-strong: rgba(255, 255, 255, 0.2);
          --primary: #3ea6ff;
          --primary-fg: #0f0f0f;
          --pill-ok-bg: rgba(46, 125, 50, 0.2);
          --pill-ok-fg: #81c784;
          --pill-warn-bg: rgba(146, 89, 11, 0.2);
          --pill-warn-fg: #ffb74d;
          --pill-muted-bg: rgba(255, 255, 255, 0.08);
          --pill-muted-fg: #bbb;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .options-main {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 24px 64px;
      }
      .options-header h1 {
        font-size: 28px;
        margin: 0;
      }
      .options-sub {
        color: var(--fg-muted);
        margin: 4px 0 24px;
      }
      .section {
        margin-bottom: 32px;
      }
      .section h2 {
        font-size: 18px;
        margin: 0 0 12px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        gap: 16px;
      }
      .row-vertical {
        flex-direction: column;
        align-items: stretch;
      }
      .row-vertical .row-label {
        margin-bottom: 8px;
      }
      .row-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
      }
      .row-help {
        color: var(--fg-muted);
        font-size: 12px;
      }
      .input,
      .select,
      .json-editor {
        font-family: inherit;
        font-size: inherit;
        padding: 6px 8px;
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        background: var(--bg);
        color: var(--fg);
      }
      .input {
        width: 100px;
      }
      .select {
        min-width: 180px;
      }
      .json-editor {
        width: 100%;
        font-family: ui-monospace, 'JetBrains Mono', 'Cascadia Code', monospace;
        font-size: 12px;
      }
      .btn {
        cursor: pointer;
        padding: 8px 14px;
        border-radius: 6px;
        font-family: inherit;
        font-size: inherit;
        font-weight: 500;
        border: 1px solid var(--border-strong);
        background: var(--bg);
        color: var(--fg);
      }
      .btn-primary {
        background: var(--primary);
        color: var(--primary-fg);
        border-color: transparent;
      }
      .btn-secondary {
        background: transparent;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px 0;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        margin: 0 8px;
      }
      .pill-ok {
        background: var(--pill-ok-bg);
        color: var(--pill-ok-fg);
      }
      .pill-warn {
        background: var(--pill-warn-bg);
        color: var(--pill-warn-fg);
      }
      .pill-muted {
        background: var(--pill-muted-bg);
        color: var(--pill-muted-fg);
      }
      .provider-row {
        display: flex;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }
      .provider-name {
        font-weight: 500;
        flex: 1;
      }
      .advanced summary {
        cursor: pointer;
        font-size: 18px;
        font-weight: 600;
        padding: 4px 0;
      }
      .advanced[open] summary {
        margin-bottom: 12px;
      }
      .override-status {
        color: var(--fg-muted);
        font-size: 12px;
        padding: 4px 0;
      }
      .about-version {
        margin-bottom: 8px;
      }
      .about-links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .link {
        color: var(--primary);
        text-decoration: none;
      }
      .link:hover {
        text-decoration: underline;
      }
      .error {
        color: var(--error-fg);
        padding: 8px 0;
      }
    </style>
  </head>
  <body>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
