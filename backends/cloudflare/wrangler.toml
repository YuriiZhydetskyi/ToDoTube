name = "todotube-sync"
main = "worker.js"
compatibility_date = "2024-09-01"

# A KV namespace to hold the usage records. Create it with:
#   npx wrangler kv namespace create USAGE
# then paste the printed id below.
[[kv_namespaces]]
binding = "USAGE"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# SYNC_SECRET is NOT stored here — set it as an encrypted secret:
#   npx wrangler secret put SYNC_SECRET
